<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>나드리 · 프로토타입 v10</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
:root{
  --canvas:#E9EDF3;--app:#F5F7FB;--white:#fff;
  --blue:#2F6BF3;--blue-deep:#1E4FBF;--blue-soft:#E8EFFE;
  --gold:#FDB022;--gold-soft:#FEF0D5;
  --grow:#12B76A;--grow-soft:#DEF7EC;--grow-deep:#087443;
  --ink:#16202E;--muted:#6E7A8A;--line:#EDEFF4;--dim:#AEB6C2;
  --red:#E5484D;
  --shadow:0 8px 24px rgba(30,50,90,.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Pretendard','Noto Sans KR',-apple-system,'Apple SD Gothic Neo',sans-serif;
  background:radial-gradient(900px 500px at 50% -8%,#F1F4F9,var(--canvas));
  color:var(--ink);min-height:100%;
  display:flex;flex-direction:column;align-items:center;gap:14px;padding:22px 14px 40px;
}
.brandline{display:flex;align-items:center;gap:9px;color:var(--blue-deep);font-weight:800;font-size:15px}
.brandline small{font-weight:600;color:var(--muted)}
.phone{width:390px;max-width:96vw;height:830px;max-height:86vh;background:var(--app);
  border-radius:46px;position:relative;overflow:hidden;border:10px solid #0E1826;
  box-shadow:0 30px 70px rgba(18,40,70,.26)}
.statusbar{height:36px;display:flex;align-items:center;justify-content:space-between;
  padding:0 26px;font-size:13px;font-weight:700;opacity:.85;position:relative;z-index:5}
.notch{position:absolute;left:50%;top:8px;transform:translateX(-50%);background:#0E1826;color:#fff;
  font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px}

/* screen system */
.screens{position:absolute;inset:36px 0 0 0;overflow:hidden}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;opacity:0;transform:translateY(10px);
  pointer-events:none;transition:opacity .24s ease,transform .24s ease;padding-bottom:96px;scrollbar-width:none}
.screen::-webkit-scrollbar{display:none}
.screen.on{opacity:1;transform:none;pointer-events:auto;z-index:2}
.screen.noTab{padding-bottom:0}

/* header */
.shead{position:sticky;top:0;background:var(--app);z-index:6;display:flex;align-items:center;
  gap:8px;padding:10px 16px 12px;border-bottom:1px solid transparent}
.shead.line{border-color:var(--line)}
.backb{width:34px;height:34px;border-radius:11px;border:none;background:transparent;font-size:20px;
  color:var(--ink);cursor:pointer;display:grid;place-items:center;flex:0 0 auto}
.backb:hover{background:#EDF0F6}
.shead h2{flex:1;text-align:center;font-size:17px;font-weight:800;letter-spacing:-.3px}
.shead .spacer{width:34px;flex:0 0 auto}

/* tabbar */
.tabbar{position:absolute;left:0;right:0;bottom:0;height:74px;background:rgba(255,255,255,.94);
  backdrop-filter:blur(12px);border-top:1px solid var(--line);display:grid;
  grid-template-columns:repeat(5,1fr);align-items:center;z-index:30;padding-bottom:6px}
.tabbar.hide{display:none}
.tab{display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;
  cursor:pointer;color:var(--dim);font-size:11px;font-weight:700;padding:6px 0}
.tab .ic{font-size:19px;line-height:1;filter:grayscale(1);opacity:.5;transition:.15s}
.tab.on{color:var(--blue)}
.tab.on .ic{filter:none;opacity:1;transform:translateY(-1px)}

/* generic */
.pad{padding:0 16px}
.card{background:var(--white);border-radius:20px;padding:18px;box-shadow:var(--shadow)}
.row{display:flex;align-items:center;gap:10px}
.between{display:flex;align-items:center;justify-content:space-between;gap:10px}
.muted{color:var(--muted)}
.tiny{font-size:12px}
.sm{font-size:13px}
.b{font-weight:800}
.center{text-align:center}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt24{margin-top:24px}
.sect-t{font-size:15px;font-weight:800;letter-spacing:-.3px;margin:22px 16px 10px}
.sect-t span{font-size:12px;font-weight:600;color:var(--muted);margin-left:6px}

.btn{width:100%;border:none;border-radius:16px;padding:16px;font-size:16px;font-weight:800;
  font-family:inherit;cursor:pointer;transition:.15s;letter-spacing:-.3px}
.btn:active{transform:scale(.985)}
.btn.pri{background:var(--blue);color:#fff}
.btn.grow{background:var(--grow);color:#fff}
.btn.ghost{background:#EEF1F6;color:var(--ink)}
.btn.line{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
.btn.danger{background:#FDECEC;color:var(--red)}
.btn:disabled{background:#EDEFF4;color:var(--dim);cursor:not-allowed}
.btn.sm{padding:12px;font-size:14px;border-radius:13px}
.btn2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.pill{display:inline-flex;align-items:center;gap:6px;background:#fff;border-radius:999px;
  padding:7px 13px;font-size:13px;font-weight:800;box-shadow:0 2px 8px rgba(30,50,90,.06)}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--blue-soft);color:var(--blue-deep);
  border-radius:999px;padding:6px 11px;font-size:12px;font-weight:800}
.chip.g{background:var(--grow-soft);color:var(--grow-deep)}
.chip.y{background:var(--gold-soft);color:#A66A00}
.badge{background:var(--gold);color:#fff;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:800}

/* onboarding */
#s-onboard{display:flex;flex-direction:column;justify-content:center;padding:0 26px 40px}
.ob-brand{text-align:center;margin-bottom:auto;margin-top:auto}
.ob-sub{font-size:14px;font-weight:700;color:var(--muted);letter-spacing:-.2px}
.ob-logo{font-size:46px;font-weight:900;color:var(--blue);letter-spacing:-2px;margin-top:8px}
.ob-btns{margin-top:auto;display:flex;flex-direction:column;gap:10px;padding-bottom:26px}
.ob-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;border-radius:15px;
  padding:15px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;border:1.5px solid var(--line);
  background:#fff;color:var(--ink);transition:.15s}
.ob-btn:active{transform:scale(.985)}
.ob-btn.toss{background:#0064FF;color:#fff;border-color:#0064FF}
.lg{width:20px;height:20px;border-radius:6px;display:grid;place-items:center;font-size:12px;font-weight:900;flex:0 0 auto}
.lg.mail{background:#EDEFF4;color:#5A6675}
.lg.toss{background:#fff;color:#0064FF;font-size:13px}

/* home */
.hero{margin:2px 16px 0;background:#fff;border-radius:24px;padding:18px;box-shadow:var(--shadow)}
.ring-wrap{position:relative;width:214px;height:214px;margin:6px auto 2px}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-c .lab{font-size:12px;font-weight:700;color:var(--muted)}
.ring-c .num{font-size:42px;font-weight:900;letter-spacing:-2px;line-height:1.1}
.ring-c .goal{font-size:12px;font-weight:700;color:var(--dim);margin-top:2px}
.stat2{display:grid;grid-template-columns:1fr 1fr;text-align:center;margin-top:6px}
.stat2 b{font-size:17px;font-weight:900}
.stat2 b i{font-style:normal;font-size:12px;color:var(--muted)}
.stat2 p{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}

.claim{margin:12px 16px 0;background:#fff;border-radius:20px;padding:14px 16px;box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:space-between;gap:10px}
.claim .l p{font-size:12px;color:var(--muted);font-weight:700}
.claim .l b{font-size:24px;font-weight:900;letter-spacing:-1px}
.claim button{border:none;background:var(--blue);color:#fff;border-radius:13px;padding:12px 20px;
  font-size:15px;font-weight:800;font-family:inherit;cursor:pointer}
.claim button:disabled{background:#EDEFF4;color:var(--dim)}

.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 16px 0}
.qb{background:#fff;border:none;border-radius:18px;padding:13px 4px 11px;box-shadow:var(--shadow);
  cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:7px;position:relative}
.qb:active{transform:scale(.97)}
.qb .ic{width:36px;height:36px;border-radius:12px;display:grid;place-items:center;font-size:19px}
.qb span{font-size:12px;font-weight:800;color:var(--ink)}
.qb .dot{position:absolute;top:9px;right:11px;width:7px;height:7px;border-radius:50%;background:var(--red)}

.grow-banner{margin:14px 16px 0;background:linear-gradient(135deg,#EDF2FF,#E7EEFE);border-radius:20px;
  padding:16px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:10px}
.grow-banner b{font-size:15px;font-weight:800;color:var(--blue-deep)}
.grow-banner p{font-size:12px;color:#6076A0;font-weight:600;margin-top:3px}
.grow-banner .pig{font-size:38px}

.asset-strip{margin:12px 16px 0;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.asset-strip .a{background:#fff;border-radius:16px;padding:12px 14px;box-shadow:var(--shadow)}
.asset-strip .a p{font-size:11px;color:var(--muted);font-weight:700}
.asset-strip .a b{font-size:16px;font-weight:900;letter-spacing:-.5px;display:block;margin-top:3px}

/* progress bar */
.pbar{height:8px;background:#EDEFF4;border-radius:999px;overflow:hidden}
.pbar i{display:block;height:100%;background:var(--blue);border-radius:999px;transition:width .5s cubic-bezier(.3,1,.4,1)}
.pbar.g i{background:var(--grow)}

/* list rows (혜택) */
.lrow{background:#fff;border-radius:18px;padding:15px 16px;margin:0 16px 8px;display:flex;align-items:center;
  gap:12px;box-shadow:var(--shadow);cursor:pointer;border:none;width:calc(100% - 32px);font-family:inherit;text-align:left}
.lrow:active{transform:scale(.99)}
.lrow .ic{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;font-size:21px;flex:0 0 auto}
.lrow .tx{flex:1;min-width:0}
.lrow .tx b{font-size:15px;font-weight:800;display:block;letter-spacing:-.3px}
.lrow .tx p{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:2px}
.lrow .go{color:var(--dim);font-size:16px}
.lrow.done{opacity:.5}

/* interest */
.grow-card{margin:0 16px;border-radius:24px;padding:20px 18px;color:#fff;position:relative;overflow:hidden}
.grow-card.p{background:linear-gradient(140deg,#16C172,#0E9E5C)}
.grow-card.c{background:linear-gradient(140deg,#3C7BFF,#2455C8)}
.grow-card .k{font-size:13px;font-weight:800;opacity:.9}
.grow-card .big{font-size:34px;font-weight:900;letter-spacing:-1.5px;margin-top:6px;line-height:1.15;
  font-variant-numeric:tabular-nums}
.grow-card .big small{font-size:19px;opacity:.85;font-weight:800}
.grow-card .dec{font-size:19px;opacity:.75}
.grow-card .rowline{display:flex;justify-content:space-between;align-items:center;margin-top:14px;
  padding-top:12px;border-top:1px solid rgba(255,255,255,.22);font-size:13px;font-weight:700}
.grow-card .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.grow-card .btns button{border:none;border-radius:13px;padding:12px;font-size:14px;font-weight:800;
  font-family:inherit;cursor:pointer;background:rgba(255,255,255,.22);color:#fff}
.grow-card .btns button.solid{background:#fff;color:var(--grow-deep)}
.grow-card.c .btns button.solid{color:var(--blue-deep)}
.empty-stake{text-align:center;padding:6px 0 2px}
.empty-stake .big{opacity:.55}

.intro-hero{text-align:center;padding:14px 26px 0}
.intro-hero h1{font-size:27px;font-weight:900;letter-spacing:-1px;line-height:1.3}
.intro-pig{font-size:92px;margin:18px 0 6px}
.intro-list{background:#fff;border-radius:20px;padding:6px 18px;margin:8px 16px 0;box-shadow:var(--shadow)}
.intro-list div{padding:15px 0;font-size:15px;font-weight:700;border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:10px}
.intro-list div:last-child{border:none}

/* slider */
.amt{text-align:center;font-size:38px;font-weight:900;color:var(--blue);letter-spacing:-1.5px;margin:12px 0 4px}
.amt small{font-size:20px}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:999px;background:#E3E7EE;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;
  background:var(--blue);cursor:pointer;box-shadow:0 2px 8px rgba(47,107,243,.4)}
.numin{width:100%;border:1.5px solid var(--line);border-radius:15px;padding:15px;font-size:22px;font-weight:900;
  text-align:center;font-family:inherit;color:var(--ink);background:#fff}
.numin:focus{outline:none;border-color:var(--blue)}

/* shop */
.shop-head{margin:0 16px;background:#fff;border-radius:20px;padding:16px 18px;box-shadow:var(--shadow)}
.shop-head .k{font-size:12px;color:var(--muted);font-weight:700}
.shop-head .v{font-size:30px;font-weight:900;letter-spacing:-1.4px;margin-top:2px}
.shop-head .stake{font-size:11.5px;color:var(--dim);font-weight:600;margin-top:6px;font-variant-numeric:tabular-nums}
.cats{display:flex;gap:7px;overflow-x:auto;padding:0 16px;margin-top:14px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat{flex:0 0 auto;border:none;background:#fff;border-radius:999px;padding:10px 15px;font-size:13.5px;
  font-weight:800;color:var(--muted);font-family:inherit;cursor:pointer;box-shadow:0 2px 6px rgba(30,50,90,.05)}
.cat.on{background:var(--ink);color:#fff}
.brands{display:flex;gap:14px;overflow-x:auto;padding:14px 16px 4px;scrollbar-width:none}
.brands::-webkit-scrollbar{display:none}
.brand{flex:0 0 auto;width:62px;text-align:center;cursor:pointer;border:none;background:none;font-family:inherit}
.brand .cc{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;font-size:11px;
  font-weight:900;margin:0 auto 6px;line-height:1.1;padding:4px;border:1.5px solid var(--line);overflow:hidden}
.brand span{font-size:11px;font-weight:700;color:var(--muted);display:block;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.brand.on span{color:var(--ink);font-weight:800}
.brand.on .cc{border-color:var(--ink);border-width:2px}
.cat-note{margin:12px 16px 0;background:#fff;border-radius:14px;padding:12px 14px;font-size:12.5px;
  color:var(--muted);font-weight:600;line-height:1.5;border-left:3px solid var(--blue)}
.prod{display:flex;gap:14px;align-items:center;background:#fff;border-radius:18px;padding:14px;
  margin:8px 16px 0;box-shadow:var(--shadow);cursor:pointer;border:none;width:calc(100% - 32px);
  font-family:inherit;text-align:left}
.prod:active{transform:scale(.99)}
.prod .im{width:74px;height:74px;border-radius:14px;background:#F3F5F9;display:grid;place-items:center;
  font-size:34px;flex:0 0 auto;position:relative}
.prod .im .tagv{position:absolute;bottom:-5px;right:-5px;background:#fff;border-radius:999px;padding:3px 8px;
  font-size:10.5px;font-weight:900;box-shadow:0 2px 6px rgba(0,0,0,.12)}
.prod .tx{flex:1;min-width:0}
.prod .tx .br{font-size:12px;color:var(--muted);font-weight:700}
.prod .tx .nm{font-size:14.5px;font-weight:800;margin-top:1px;line-height:1.35}
.prod .tx .pr{font-size:19px;font-weight:900;margin-top:5px;display:flex;align-items:center;gap:5px}
.prod .tx .pr i{width:19px;height:19px;border-radius:50%;background:var(--gold);color:#fff;font-size:11px;
  font-weight:900;display:grid;place-items:center;font-style:normal}
.prod .tx .cnt{font-size:11.5px;color:var(--dim);font-weight:600;margin-top:3px}
.prod.cant .tx .pr{color:var(--dim)}

.reviews{margin:14px 16px 0;background:#fff;border-radius:18px;padding:6px 16px;box-shadow:var(--shadow);
  height:104px;overflow:hidden;position:relative}
.rv-track{transition:transform .5s cubic-bezier(.4,0,.2,1)}
.rv{padding:13px 0;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:flex-start;height:52px}
.rv .av{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:13px;flex:0 0 auto}
.rv p{font-size:12.5px;font-weight:700;line-height:1.35}
.rv span{font-size:11px;color:var(--dim);font-weight:600}

/* sheet / modal */
.mask{position:absolute;inset:0;background:rgba(12,20,34,.42);opacity:0;pointer-events:none;
  transition:.22s;z-index:60}
.mask.on{opacity:1;pointer-events:auto}
.sheet{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:26px 26px 0 0;padding:22px 20px 26px;
  transform:translateY(101%);transition:transform .28s cubic-bezier(.3,1,.4,1);z-index:61;max-height:88%;overflow-y:auto}
.sheet.on{transform:none}
.sheet .hb{width:38px;height:4px;border-radius:99px;background:#E2E6ED;margin:0 auto 16px}
.sheet h3{font-size:19px;font-weight:900;letter-spacing:-.5px;text-align:center}
.sheet .sub{font-size:13.5px;color:var(--muted);font-weight:600;text-align:center;margin-top:6px;line-height:1.5}
.pay{display:flex;align-items:center;gap:12px;padding:15px 14px;border:1.5px solid var(--line);border-radius:15px;
  margin-top:8px;cursor:pointer;font-weight:800;font-size:15px;background:#fff;width:100%;font-family:inherit}
.pay:active{background:#F7F9FC}
.pay .cc{width:32px;height:32px;border-radius:10px;display:grid;place-items:center;font-size:12px;font-weight:900;color:#fff}

/* toast */
.toast{position:absolute;left:50%;bottom:96px;transform:translate(-50%,14px);background:rgba(16,24,38,.93);
  color:#fff;padding:13px 20px;border-radius:15px;font-size:14px;font-weight:800;opacity:0;
  transition:.25s;z-index:80;pointer-events:none;text-align:center;max-width:86%;line-height:1.45}
.toast.on{opacity:1;transform:translate(-50%,0)}

/* attendance */
.att{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:0 16px}
.att .d{background:#fff;border-radius:16px;padding:12px 6px;text-align:center;box-shadow:var(--shadow);position:relative}
.att .d .n{font-size:11px;font-weight:800;color:var(--muted)}
.att .d .p{font-size:14px;font-weight:900;margin-top:5px}
.att .d .co{font-size:20px;margin-top:4px}
.att .d.got{background:var(--grow-soft)}
.att .d.got .p{color:var(--grow-deep)}
.att .d.today{outline:2px solid var(--blue);outline-offset:-2px}
.att .d.d7{grid-column:span 1;background:var(--gold-soft)}

/* quiz */
.qz{margin:0 16px;background:#fff;border-radius:22px;padding:22px 20px;box-shadow:var(--shadow);text-align:center}
.qz .cat{display:inline-block;background:var(--blue-soft);color:var(--blue-deep);border-radius:999px;
  padding:5px 12px;font-size:12px;font-weight:800;margin-bottom:14px}
.qz .q{font-size:19px;font-weight:800;line-height:1.5;letter-spacing:-.4px;min-height:86px;display:flex;
  align-items:center;justify-content:center}
.oxb{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px}
.oxb button{border:none;border-radius:20px;padding:26px 0;font-size:38px;font-weight:900;cursor:pointer;
  font-family:inherit;background:#fff;box-shadow:var(--shadow);transition:.15s}
.oxb button.o{color:var(--blue)}
.oxb button.x{color:var(--red)}
.oxb button:active{transform:scale(.96)}
.oxb button:disabled{opacity:.4}
.ans{margin:12px 16px 0;border-radius:16px;padding:15px 16px;font-size:13.5px;font-weight:700;line-height:1.55}
.ans.ok{background:var(--grow-soft);color:var(--grow-deep)}
.ans.no{background:#FDECEC;color:#B42318}

/* roulette */
.wheel-wrap{position:relative;width:250px;height:250px;margin:10px auto 0}
.wheel{width:250px;height:250px;border-radius:50%;position:relative;transition:transform 4.2s cubic-bezier(.15,.9,.25,1);
  border:8px solid #fff;box-shadow:0 10px 30px rgba(30,50,90,.18)}
.wheel .seg{position:absolute;inset:0;display:grid;place-items:start center;padding-top:16px;
  font-size:15px;font-weight:900;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.25)}
.needle{position:absolute;top:-6px;left:50%;transform:translateX(-50%);font-size:26px;z-index:3;
  filter:drop-shadow(0 2px 3px rgba(0,0,0,.25))}
.wheel-c{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:64px;height:64px;
  background:#fff;border-radius:50%;display:grid;place-items:center;font-size:13px;font-weight:900;
  box-shadow:0 3px 10px rgba(0,0,0,.14);z-index:2;color:var(--ink)}

/* game */

/* opts.noDaily = 하루 적립 한도에 포함하지 않음 (친구 초대) */
function addPoint(p, why, opts) {
  opts = opts || {};
  if (!opts.noDaily) {
    const room = capLeft();
    if (room <= 0) { toast('오늘 적립 한도를 다 채웠어요<br>내일 다시 받을 수 있어요'); return 0; }
    if (p > room) { p = room; toast(`오늘 적립 한도까지 <b>+${fmt(p)}P</b>만 받았어요`); }
  }
  S.points += p;
  if (!opts.noDaily) S.todayPoint += p;
  S.history.unshift({ t: Date.now(), why, p, u: 'P', noDaily: opts.noDaily });
  if (!(opts.silent)) toast(`${why} <b>+${fmt(p)}P</b>`);
  syncHome();
  return p;
}
function spendPoint(p, why) { S.points -= p; S.history.unshift({ t: Date.now(), why, p: -p, u: 'P' }); syncHome(); }
function logWon(amt, why) { S.history.unshift({ t: Date.now(), why, p: amt, u: 'W' }); }
function syncHome() {
  const set = (id, v) => { const e = $(id); if (e) e.textContent = v; };
  set('h-points', fmtP(S.points));
  set('h-tp', fmt(S.todayPoint) + ' / ' + fmt(DAILY_CAP) + 'P');
  const bar = $('h-tpbar'); if (bar) bar.style.width = Math.min(100, S.todayPoint / DAILY_CAP * 100) + '%';

}

let barDown = false;
function brBar() {
  const row = $('bestrow'), th = $('brthumb'), bar = $('sbar'); if (!row || !th || !bar) return;
  const upd = () => {
    const max = row.scrollWidth - row.clientWidth;
    const w = Math.max(18, row.clientWidth / row.scrollWidth * 100);
    th.style.width = w + '%';
    th.style.left = (max > 0 ? row.scrollLeft / max * (100 - w) : 0) + '%';
  };
  const seek = (x) => {
    const r = bar.getBoundingClientRect(), tw = th.offsetWidth;
    let p = (x - r.left - tw / 2) / Math.max(1, r.width - tw);
    p = Math.max(0, Math.min(1, p));
    row.scrollLeft = p * (row.scrollWidth - row.clientWidth);
  };
  row.addEventListener('scroll', upd);
  bar.onmousedown = e => { barDown = true; bar.classList.add('drag'); seek(e.clientX); e.preventDefault(); };
  bar.ontouchstart = e => seek(e.touches[0].clientX);
  bar.ontouchmove = e => { seek(e.touches[0].clientX); e.preventDefault(); };
  window.__seek = seek;
  upd();
}

function dragScroll(id) {
  const el = $(id); if (!el) return;
  let down = false, x0 = 0, l0 = 0;
  el.addEventListener('mousedown', e => { down = true; x0 = e.pageX; l0 = el.scrollLeft; el.classList.add('drag'); });
  const stop = () => { down = false; el.classList.remove('drag'); };
  el.addEventListener('mouseleave', stop); el.addEventListener('mouseup', stop);
  el.addEventListener('mousemove', e => { if (!down) return; e.preventDefault(); el.scrollLeft = l0 - (e.pageX - x0); });
}

function pickDrop(basic) {
  if (basic) return DROPS[0];
  const t = DROPS.reduce((a, d) => a + d.w, 0); let r = Math.random() * t;
  for (const d of DROPS) { r -= d.w; if (r <= 0) return d; }
  return DROPS[0];
}
function startGame() {
  const basic = S.gamePlays > 0;
  if (basic) S.gameAdReady = false;
  S.gamePlays++;
  const wrap = $('gwrap'); const st = $('g-start'); if (st) st.remove();
  let score = 0, left = 20, coins = [];
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const spawn = setInterval(() => {
    const d = pickDrop(basic);
    const el = document.createElement('div');
    el.className = 'coin ' + d.c; el.innerHTML = `<b>${d.e}</b>`;
    el.style.left = (10 + Math.random() * (W - 62)) + 'px'; el.style.top = '-44px';
    const sp = 3.4 + Math.random() * 2.4;
    el.onclick = (ev) => {
      ev.stopPropagation(); if (el.dataset.got) return; el.dataset.got = 1;
      score += d.v; $('g-score').textContent = score;
      const pop = document.createElement('div'); pop.className = 'gpop';
      pop.textContent = d.v ? '+' + d.v + 'P' : '꽝';
      if (!d.v) pop.style.color = 'var(--muted)';
      pop.style.left = el.style.left; pop.style.top = el.style.top;
      wrap.appendChild(pop); setTimeout(() => pop.remove(), 700);
      el.remove(); coins = coins.filter(c => c.el !== el);
    };
    wrap.appendChild(el); coins.push({ el, y: -44, sp });
  }, 700);
  const move = setInterval(() => {
    coins.forEach(c => { c.y += c.sp; c.el.style.top = c.y + 'px'; if (c.y > H) { c.el.remove(); coins = coins.filter(x => x !== c); } });
  }, 16);
  const clock = setInterval(() => {
    left--; $('g-time').textContent = left;
    if (left <= 0) {
      clearInterval(spawn); clearInterval(move); clearInterval(clock);
      coins.forEach(c => c.el.remove());
      const pay = Math.min(score, 40);
      if (score > S.gameBest) S.gameBest = score;
      if (pay > 0) addPoint(pay, '게임에서 잡은 포인트'); else toast('한 개도 못 잡았어요');
      wrap.innerHTML = `<div style="position:absolute;inset:0;display:grid;place-items:center;text-align:center"><div>

    }
  }, 1000);
  window.cleanup = () => { clearInterval(spawn); clearInterval(move); clearInterval(clock); };
}

function rollGacha() {
  if (S.gachaRolling) return;
  if (S.points < GACHA_COST) return toast('포인트가 모자라요');
  S.gachaRolling = true;
  spendPoint(GACHA_COST, '나드리 뽑기');
  const btn = $('gbtn'), ball = $('gball'), txt = $('gtxt');
  if (btn) { btn.disabled = true; btn.textContent = '뽑는 중이에요'; }

  let i = 0;

function finishGacha() {
  window.cleanup = null;

  for (const g of GACHA) { if (r < g.rate) { hit = g; break; } r -= g.rate; }

function doStop(k, fromShop) {
  const tot = k === 'p' ? pTotal() : cTotal();

  if (k === 'c') v = Math.floor(v);
  if (v <= 0) return toast('금액을 입력해주세요');
  v = Math.min(v, tot);
  if (k === 'p') {
    let rest = v; const fe = Math.min(S.pEarn, rest); S.pEarn -= fe; rest -= fe; S.pStake = Math.max(0, S.pStake - rest);
    S.points += v; S.history.unshift({ t: Date.now(), why: '이자받기에서 빼기', p: v, u: 'P' });
    toast(`${fmtP(v)}P가 내 포인트로 돌아왔어요`);
  } else {
    let rest = v; const fe = Math.min(S.cEarn, rest); S.cEarn -= fe; rest -= fe; S.cStake = Math.max(0, S.cStake - rest);
    S.cash += v; logWon(v, '자산 저금 해제'); toast(`${won(v)}이 내 자산으로 돌아왔어요`);
  }

  ${it.live ? '<div class="notice2 mt16">값이 오르내리는 자산이에요. 산 금액보다 적어질 수 있고, 실물 배송은 지원하지 않아요.</div>' : ''}

      : `<div class="notice2 mt16">${fmt(it.p - S.points)}P가 모자라요.${pTotal() >= it.p - S.points ? ' 이자 받는 포인트를 빼면 지금 바꿀 수 있어요.' : ''}</div>

function doBuy(it) {
  if (S.points < it.p) { closeSheet(); return toast('포인트가 모자라요'); }
  spendPoint(it.p, it.n);
  if (it.live === 'btc') S.hold.btc += it.won / S.btc;
  else if (it.live === 'paxg') S.hold.paxg += it.won / S.paxg;
  else if (it.toCash) { S.cash += it.won; logWon(it.won, '포인트를 현금으로 전환'); }
  else {
    S.coupons.unshift({ n: it.n, e: it.e, br: it.br, t: Date.now(), exp: Date.now() + 90 * 86400000,
      code: 'N' + Math.random().toString(36).slice(2, 6).toUpperCase() + '-' + Math.random().toString(36).slice(2, 6).toUpperCase(), used: false });
  }
  closeSheet();
  toast('구매가 끝났어요<br>내 지갑에서 확인하세요');

}

    <div><span>🚨</span><div><b>남에게 보여주면 자산을 전부 잃어요</b><p>복구 구문과 개인키를 아는 사람은 누구나 이 지갑의 돈을 마음대로 가져갈 수 있어요. 비밀번호와 달리 바꿀 수도 없어요.</p></div></div>
    <div><span>🎣</span><div><b>물어보는 사람은 100% 사기예요</b><p>나드리 고객센터, 직원, 어떤 기관도 복구 구문을 묻지 않아요. 이벤트나 에어드랍을 미끼로 입력을 요구하면 전부 사기예요.</p></div></div>
    <div><span>📵</span><div><b>사진, 메모앱, 클라우드에 저장하면 위험해요</b><p>휴대폰이 해킹되거나 계정이 털리면 그대로 새어 나가요. 꼭 필요하면 종이에 적어 오프라인에 보관하세요.</p></div></div>
    <div><span>↩️</span><div><b>한 번 새어 나가면 되돌릴 수 없어요</b><p>블록체인 거래는 취소나 환불이 되지 않아요. 나드리도 도와드릴 방법이 없어요.</p></div></div>
  </div>
  <button class="btn ghost mt16" onclick="closeSheet()">돌아갈게요</button>
  <button class="btn danger mt8" onclick="advConfirm()">위험을 이해했어요. 그래도 볼래요</button>`);
}
function advConfirm() {
  openSheet(`<h3>정말 열어볼까요</h3>
  <p class="sub">지금 주변에 화면을 보고 있는 사람이 없는지 확인해주세요</p>
  <div class="dangerbox mt16">
    <b>이 화면을 캡처하지 마세요</b>
    <p>캡처한 사진은 갤러리와 클라우드에 남아요. 그 경로로 자산을 잃는 사고가 가장 많아요.</p>
  </div>
  <button class="btn ghost mt16" onclick="closeSheet()">그만둘게요</button>
  <button class="btn danger mt8" onclick="advReveal()">확인했어요. 열어주세요</button>`);
}
function advReveal() {
  S.keyShown = true;
  openSheet(`<h3>복구 구문과 개인키</h3>
  <p class="sub">가려진 부분을 눌러야 보여요</p>
  <div class="sect-t" style="margin:18px 0 8px 0">복구 구문 12단어</div>
  <div class="hidewrap blur" onclick="this.classList.toggle('blur')">
    <div class="seedbox">${SEED.map((s, i) => `<span><i>${i + 1}</i>${s}</span>`).join('')}</div>
    <span class="cover">눌러서 보기</span>
  </div>
  <div class="sect-t" style="margin:18px 0 8px 0">개인키</div>
  <div class="hidewrap blur" onclick="this.classList.toggle('blur')">
    <div class="keybox">${PRIVKEY}</div>
    <span class="cover">눌러서 보기</span>
  </div>
  <div class="dangerbox mt16">
    <b>지금 본 내용을 누구에게도 알려주지 마세요</b>
    <p>나드리 직원을 포함해 어떤 사람도 이 정보를 물어볼 일이 없어요.</p>
  </div>
  <button class="btn line mt16" onclick="toast('복사했어요. 안전한 곳에만 붙여넣으세요')">복구 구문 복사하기</button>
  <button class="btn pri mt8" onclick="closeSheet()">다 확인했어요</button>`);
}

/* ===== 실시간 틱 ===== */
function tick() {
  const now = Date.now(), dt = Math.min(1, (now - S.lastTick) / 1000); S.lastTick = now;
  if (S.dayStamp !== today()) resetDay();
  if (S.pStake > 0) { const g = pPerSec() * dt; S.pEarn += g; S.pToday += g; }
  if (S.cStake > 0) { const g = cPerSec() * dt; S.cEarn += g; S.cToday += g; }
  const set = (id, html) => { const e = $(id); if (e) e.innerHTML = html; };
  set('ip-total', growNum(pTotal(), 7) + '<small>P</small>');
  set('ip-today', '+' + fmtd(S.pToday, 4) + 'P');
  set('ic-total', growNum(cTotal(), 4) + '<small>원</small>');
  set('ic-today', '+' + fmtd(S.cToday, 4) + '원');
  set('ic-idle', won(S.cash));
  set('shop-stake', `🌱 이자 받는 중 ${fmtd(pTotal(), 4)}P`);
  set('sheet-stake', fmtd(pTotal(), 4) + 'P');
  const hs = $('h-stake'); if (hs) hs.textContent = fmtd(pTotal(), 2) + 'P';
  const ha = $('h-asset'); if (ha) ha.textContent = won(S.cash + cTotal());
  const wt = $('w-total'); if (wt) wt.textContent = won(netWorth());
}
function resetDay() {
  S.dayStamp = today();
  S.pToday = 0; S.cToday = 0; S.todayPoint = 0; S.history = [];
  S.bonusGot = [0, 0, 0]; S.attToday = false; S.stepClaimed = false;
  S.adViews = 0; S.gamePlays = 0; S.gameAdReady = false;
  S.rouletteUsed = false; S.rouletteBoost = false;
  S.quizSolved = 0; S.quizPool = []; S.quizIdx = 0; S.quizAnswered = null; S.quizLog = [];
}

/* 오라클 시세 */
setInterval(() => {
  S.btc = Math.round(S.btc * (1 + (Math.random() - .5) * 0.0016));
  S.paxg = Math.round(S.paxg * (1 + (Math.random() - .5) * 0.0008));
  document.querySelectorAll('.livq').forEach(el => {
    const k = el.dataset.live, w = +el.dataset.won;
    el.textContent = '지금 ' + (k === 'btc' ? (w / S.btc).toFixed(8) + ' BTC' : (w / S.paxg).toFixed(6) + ' PAXG');
  });
}, 2500);

/* 후기 롤링 */
let rvI = 0;
setInterval(() => {
  const t = $('rv-track'); if (!t) return;
  rvI++; t.style.transition = '';
  t.style.transform = `translateY(-${rvI * 58}px)`;
  if (rvI >= REVIEWS.length) setTimeout(() => {
    t.style.transition = 'none'; rvI = 0; t.style.transform = 'translateY(0)';
    setTimeout(() => t.style.transition = '', 40);
  }, 520);
}, 2800);

setInterval(() => {
  const d = new Date();
  $('clock').textContent = d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
}, 1000);
setInterval(tick, 100);
$('stepchip').textContent = fmt(S.steps) + ' 걸음';
nav('onboard');

</script>
</body>
</html>
